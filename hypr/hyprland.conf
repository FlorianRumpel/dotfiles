###################
### MY PROGRAMS ###
###################
# See https://wiki.hypr.land/Configuring/Keywords/

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$benq=DP-1
$terra=HDMI-A-1

source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/permissions.conf
source = ~/.config/hypr/look-and-feel.conf
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf

#Workspaces Rules
workspace = 1, monitor:$benq,persistent:true
workspace = 2 , monitor:$terra,default:true,persistent:true
workspace = 3 , monitor:$terra,persistent:true

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
